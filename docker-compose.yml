services:
  # ==========================================
  # 1. GATEWAY & FRONTEND TIER
  # ==========================================
  frontend:
    image: ghcr.io/mstefn/gym-frontend:latest
    container_name: gym-frontend
    restart: always
    ports:
      - "80:80" 
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - public_net
      - backend_net
    depends_on:
      - backend

  # ==========================================
  # 2. BACKEND & DATABASE TIER
  # ==========================================
  backend:
    image: ghcr.io/mstefn/gym-backend:latest
    container_name: gym-backend
    restart: always    
    env_file: .env
    environment:
      - DB_DSN=${DB_DSN}
      - AUTH_SECRET=${AUTH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      - db
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - backend_net
      - monitoring_net

  db:
    image: mariadb:10.11
    container_name: gym-db
    restart: always
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - backend_net

  # ==========================================
  # 3. MONITORING TIER (Admin & DevOps)
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: gym-grafana
    restart: always
    ports:
      - "3000:3000" 
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring_net

  prometheus:
    image: prom/prometheus:latest
    container_name: gym-prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - monitoring_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: gym-cadvisor
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    privileged: true
    networks:
      - monitoring_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: gym-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring_net

  loki:
    image: grafana/loki:latest
    container_name: gym-loki
    restart: always
    networks:
      - monitoring_net

  alloy:
    image: grafana/alloy:latest
    container_name: gym-alloy
    restart: always
    user: root
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - monitoring_net

  # ==========================================
  # 4. QUALITY ASSURANCE TIER (SonarQube)
  # ==========================================
  sonarqube:
    image: sonarqube:community
    container_name: gym-sonarqube
    restart: always
    ports:
      - "9000:9000" 
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db-sonar:5432/sonar
      - SONAR_JDBC_USERNAME=${SONAR_DB_USER:-sonar}
      - SONAR_JDBC_PASSWORD=${SONAR_DB_PASSWORD:-sonar}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      - db-sonar
    networks:
      - monitoring_net

  db-sonar:
    image: postgres:15
    container_name: gym-sonar-db
    restart: always
    environment:
      - POSTGRES_USER=${SONAR_DB_USER:-sonar}
      - POSTGRES_PASSWORD=${SONAR_DB_PASSWORD:-sonar}
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - monitoring_net

# ==========================================
# NETWORK & VOLUME DEFINITIONS
# ==========================================
networks:
  public_net:     
    driver: bridge
  backend_net:    
    driver: bridge
  monitoring_net: 
    driver: bridge

volumes:
  mariadb_data:
  grafana_data:
  prometheus_data:
  sonar_db_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions: