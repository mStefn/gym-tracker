services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5001:4000"
    volumes:
      - backend_data:/data
    environment:
      - DB_PATH=/data/db.sqlite

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5000:8081"
    depends_on:
      - backend

volumes:
  backend_data:
