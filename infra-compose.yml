services:
  # ==========================================
  # 1. QUALITY ASSURANCE TIER
  # ==========================================
  sonarqube:
    image: sonarqube:community
    container_name: gym-sonarqube
    restart: always
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db-sonar:5432/sonar
      - SONAR_JDBC_USERNAME=${SONAR_DB_USER:-sonar}
      - SONAR_JDBC_PASSWORD=${SONAR_DB_PASSWORD:-sonar}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      - db-sonar
    networks:
      - gym_monitor_net

  db-sonar:
    image: postgres:15
    container_name: gym-sonar-db
    restart: always
    environment:
      - POSTGRES_USER=${SONAR_DB_USER:-sonar}
      - POSTGRES_PASSWORD=${SONAR_DB_PASSWORD:-sonar}
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - gym_monitor_net

  # ==========================================
  # 2. MONITORING & OBSERVABILITY TIER
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: gym-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - gym_monitor_net

  prometheus:
    image: prom/prometheus:latest
    container_name: gym-prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - gym_monitor_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: gym-cadvisor
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    privileged: true
    networks:
      - gym_monitor_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: gym-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - gym_monitor_net

  loki:
    image: grafana/loki:latest
    container_name: gym-loki
    restart: always
    networks:
      - gym_monitor_net

  alloy:
    image: grafana/alloy:latest
    container_name: gym-alloy
    restart: always
    user: root
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - gym_monitor_net

networks:
  gym_monitor_net:
    name: gym_monitor_net
    driver: bridge

volumes:
  grafana_data:
  prometheus_data:
  sonar_db_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions: