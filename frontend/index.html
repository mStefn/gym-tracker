<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="main-bg"></div>

    <div id="app-container">
        <nav id="sidebar" style="display: none;">
            <div class="sidebar-header">
                <h2 style="text-shadow: 0 0 10px var(--primary-glow);">💪 GymTracker</h2>
            </div>
            <ul class="nav-links">
                <li><button onclick="window.navigate('home')" class="nav-item active" id="nav-home">🏠 Home</button></li>
                <li><button onclick="window.navigate('workout')" class="nav-item" id="nav-workout">🏋️‍♂️ Workouts</button></li>
                <li><button onclick="window.navigate('stats')" class="nav-item" id="nav-stats">📈 Statistics</button></li>
                <li><button onclick="window.navigate('library')" class="nav-item" id="nav-library">📚 Exercises</button></li>
                <li><button onclick="window.navigate('settings')" class="nav-item" id="nav-settings">⚙️ Settings</button></li>
            </ul>
        </nav>

        <main id="main-content">
            <header id="top-bar" style="display: none;">
                <div id="user-greeting" style="font-weight: 600; font-size: 18px;"></div>
                <button onclick="window.appLogout()" class="btn-logout">Logout</button>
            </header>
            
            <div id="exercises"></div>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
