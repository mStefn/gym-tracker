<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b101e">
    
    <link rel="stylesheet" href="css/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker: Registered'))
            .catch(err => console.log('Service Worker Error: ', err));
        });
      }

      const setAppHeight = () => {
          document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
      };
      window.addEventListener('resize', setAppHeight);
      window.addEventListener('orientationchange', setAppHeight);
      setAppHeight(); 
    </script>
</head>
<body>
    <div id="main-bg"></div>

    <div id="app-container">
        <main id="main-content">
            <header id="top-bar" style="display: none;">
                <div id="user-greeting" style="font-weight: 600; font-size: 18px;"></div>
                <button onclick="window.appLogout()" class="btn-logout">Logout</button>
            </header>
            
            <nav id="sidebar" style="display: none;">
                <ul class="nav-links">
                    <li><button onclick="window.navigate('home')" class="nav-item active" id="nav-home">Home</button></li>
                    <li><button onclick="window.navigate('workout')" class="nav-item" id="nav-workout">Workouts</button></li>
                    <li><button onclick="window.navigate('stats')" class="nav-item" id="nav-stats">Statistics</button></li>
                    <li><button onclick="window.navigate('settings')" class="nav-item" id="nav-settings">Settings</button></li>
                </ul>
            </nav>
            
            <div id="exercises"></div>
        </main>
    </div>

    <div id="install-guide-overlay">
        <div class="install-card">
            <h2 style="margin-top:0; color:var(--primary); margin-bottom: 10px;">Install App</h2>
            <p style="color:#8e8e93; font-size:14px; margin-bottom: 25px;">Follow these steps to install Gym Tracker on your home screen for a full-screen native experience.</p>
            
            <div class="install-step">
                <strong style="color:var(--primary);">1.</strong> Tap the <b>Share</b> icon <span style="font-size:18px; vertical-align: middle;">⍗</span> (on iOS Safari) or the <b>Menu</b> icon <span style="font-size:18px; vertical-align: middle;">⋮</span> (on Android Chrome).
            </div>
            <div class="install-step">
                <strong style="color:var(--primary);">2.</strong> Scroll down and select <br><b style="color:var(--text);">"Add to Home Screen"</b> ➕.
            </div>
            
            <button onclick="window.closeInstallModal()" class="save-btn" style="margin-top:15px; background:rgba(255,255,255,0.05); color:var(--text); border:1px solid var(--border); box-shadow:none;">Got it</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
