<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        #tabs { margin-bottom: 20px; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border: none; background: #007bff; color: white; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .exercise-card { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f8f9fa; }
        input { width: 60px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .save-btn { background: #28a745; }
        .save-btn:hover { background: #218838; }
    </style>
</head>
<body>
    <h1>Gym Tracker</h1>
    <div id="tabs">
        <button onclick="loadCategory('Upper A')">Upper A</button>
        <button onclick="loadCategory('Upper B')">Upper B</button>
        <button onclick="loadCategory('Upper C')">Upper C</button>
        <button onclick="loadCategory('Lower A')">Lower A</button>
        <button onclick="loadCategory('Lower B')">Lower B</button>
    </div>

    <div id="exercises"></div>

    <script src="app.js"></script>
</body>
</html>
