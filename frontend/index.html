<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b101e">
    
    <link rel="stylesheet" href="css/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
      // 1. Rejestracja Service Workera
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker: Registered'))
            .catch(err => console.log('Service Worker Error: ', err));
        });
      }

      // 2. JS HEIGHT LOCK (Zamrażanie wysokości ekranu dla PWA)
      const setAppHeight = () => {
          document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
      };
      window.addEventListener('resize', setAppHeight);
      window.addEventListener('orientationchange', setAppHeight);
      setAppHeight(); // Wywołanie przy starcie
    </script>
</head>
<body>
    <div id="main-bg"></div>

    <div id="app-container">
        <main id="main-content">
            <header id="top-bar" style="display: none;">
                <div id="user-greeting" style="font-weight: 600; font-size: 18px;"></div>
                <button onclick="window.appLogout()" class="btn-logout">Logout</button>
            </header>
            
            <nav id="sidebar" style="display: none;">
                <ul class="nav-links">
                    <li><button onclick="window.navigate('home')" class="nav-item active" id="nav-home">Home</button></li>
                    <li><button onclick="window.navigate('workout')" class="nav-item" id="nav-workout">Workouts</button></li>
                    <li><button onclick="window.navigate('stats')" class="nav-item" id="nav-stats">Statistics</button></li>
                    <li><button onclick="window.navigate('settings')" class="nav-item" id="nav-settings">Settings</button></li>
                </ul>
            </nav>
            
            <div id="exercises"></div>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
