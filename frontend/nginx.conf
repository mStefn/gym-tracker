server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ==========================================
    # GZIP COMPRESSION
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ==========================================
    # REVERSE PROXY -> BACKEND (Go API)
    # ==========================================
    
    # /api/login -> http://gym-backend:4000/login
    location /api/ {
        proxy_pass http://gym-backend:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    
    location /metrics {
        proxy_pass http://gym-backend:4000/metrics;
    }

    # ==========================================
    # FRONTEND ROUTING & SPA FALLBACK
    # ==========================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /admin.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ==========================================
    # PWA CACHING STRATEGY
    # ==========================================
    location ~* /(sw\.js|manifest\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        access_log off;
    }

    location ~* \.(?:css|js|webp|png|jpg|jpeg|gif|ico|svg)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}