server {
    # Internal port matching docker-compose.yml and Dockerfile
    listen 8081;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ==========================================
    # PERFORMANCE: GZIP COMPRESSION
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ==========================================
    # ROUTING & SPA FALLBACK
    # ==========================================
    location / {
        # Fallback routing for SPA: If a file isn't found, serve index.html
        try_files $uri $uri/ /index.html;
    }

    location = /admin.html {
        # Strict exact match: Do not fallback to index.html for admin
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ==========================================
    # PWA CACHING STRATEGY (CRITICAL)
    # ==========================================
 
    # This ensures users always get the latest version of the app logic
    location ~* /(sw\.js|manifest\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        access_log off;
    }

    # 2. Aggressively cache static assets (CSS, JS, Images)
    location ~* \.(?:css|js|webp|png|jpg|jpeg|gif|ico|svg)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}